services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "18562:5562"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/reader.db
      - PORT=5562
      - HTTP_PROXY=http://192.168.0.112:7897
      - HTTPS_PROXY=http://192.168.0.112:7897
      - http_proxy=http://192.168.0.112:7897
      - https_proxy=http://192.168.0.112:7897
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5561:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  data:
